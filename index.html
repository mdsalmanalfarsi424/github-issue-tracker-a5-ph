<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.4.19/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="tailwind.css">
</head>
<body class="bg-gray-50 min-h-screen">

    <section id="login-section" class="flex items-center justify-center min-h-screen">
        <div class="card w-full max-w-md bg-base-100 shadow-xl p-8 border">
            <div class="flex flex-col items-center">
                <img src="assets/github-logo.png" alt="GitHub Logo" class="w-16 h-16 mb-4">
                <h2 class="text-2xl font-bold">GitHub Issues Tracker</h2>
                <p class="text-gray-500 mb-6">Sign in to manage your issues</p>
            </div>
            
            <div class="form-control w-full mb-4">
                <label class="label"><span class="label-text font-semibold">Username</span></label>
                <input type="text" id="username" placeholder="Enter Username" class="input input-bordered w-full" />
                <span class="text-xs text-blue-600 mt-1">Default: admin</span>
            </div>
            
            <div class="form-control w-full mb-6">
                <label class="label"><span class="label-text font-semibold">Password</span></label>
                <input type="password" id="password" placeholder="Enter Password" class="input input-bordered w-full" />
                <span class="text-xs text-blue-600 mt-1">Default: admin123</span>
            </div>
            
            <button onclick="handleLogin()" class="btn btn-primary bg-indigo-600 border-none w-full">Sign In</button>
            
            <div class="divider">OR</div>
            
            <div class="bg-blue-50 p-4 rounded-lg text-center">
                <p class="text-sm font-semibold">Demo Credentials:</p>
                <p class="text-sm">Username: <span class="font-bold">admin</span></p>
                <p class="text-sm">Password: <span class="font-bold">admin123</span></p>
            </div>
        </div>
    </section>

    <section id="main-section" class="hidden">
        <nav class="navbar bg-base-100 shadow-sm px-4 md:px-20">
            <div class="flex-1">
                <div class="flex items-center gap-2 font-bold text-xl">
                    <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" class="w-8" alt="">
                    GitHub Issues Tracker
                </div>
            </div>
            <div class="flex-none gap-4">
                <div class="form-control">
                    <input type="text" id="search-box" onkeyup="handleSearch()" placeholder="Search issues..." class="input input-bordered w-24 md:w-auto" />
                </div>
                <button class="btn btn-primary bg-indigo-600 border-none">+ New Issue</button>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto mt-10 p-4">
            <div class="flex justify-start mb-8 bg-white border border-gray-100 rounded-xl p-6 shadow-sm items-center">
                <div class="tabs tabs-boxed bg-white space-x-3">
                    <button id="tab-all" onclick="loadTab('all')" class="tab tab-active px-10 py-1 rounded-lg font-bold text-sm transition-all duration-300 border border-gray-200">All</button> 
                    <button id="tab-open" onclick="loadTab('open')" class="tab px-10 py-1 rounded-lg font-bold text-sm transition-all duration-300 border border-gray-200">Open</button> 
                    <button id="tab-closed" onclick="loadTab('closed')" class="tab px-10 py-1 rounded-lg font-bold text-sm transition-all duration-300 border border-gray-200">Closed</button>
                </div>
            </div>

            <div class="flex items-center justify-between  bg-white p-6 border rounded-t-xl">
                <div class="flex items-center gap-4">
                    <div class="p-3 bg-indigo-100 rounded-lg text-indigo-600">
                        <img src="assets/Aperture.png" alt="">
                    </div>
                    <div>
                        <h2 id="issue-count-title" class="text-xl font-bold">0 Issues</h2>
                        <p class="text-gray-500 text-sm">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex gap-4">
                    <span class="flex items-center gap-1"><span class="w-3 h-3 bg-green-500 rounded-full"></span> Open</span>
                    <span class="flex items-center gap-1"><span class="w-3 h-3 bg-purple-500 rounded-full"></span> Closed</span>
                </div>
            </div>

            <div id="loader" class="flex justify-center hidden my-10">
                <span class="loading loading-spinner loading-lg text-primary"></span>
            </div>

            <div id="issue-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 p-4 border border-t-0 rounded-b-xl bg-gray-50">
                </div>
        </div>
    </section>

    <dialog id="issue_modal" class="modal">
        <div class="modal-box w-11/12 max-w-2xl">
            <div id="modal-body">
                </div>
            <div class="modal-action">
                <form method="dialog">
                    <button class="btn btn-primary bg-indigo-600 border-none">Close</button>
                </form>
            </div>
        </div>
    </dialog>

    <script src="script.js"></script>
</body>
</html>
